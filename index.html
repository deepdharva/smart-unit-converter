<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="google-site-verification" content="5bGwiK5d-UJl66ablNELEvM0WSyzjw_MOzX_5Qb5F84" />
  
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Unit Converter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔄 Smart Unit Converter</h1>

<button id="modeToggle">🌙 Toggle Mode</button>

<div class="container">

<input type="number" id="inputValue" placeholder="Enter value">

<select id="conversionType">

<option value="kmToM">Kilometer → Meter</option>
<option value="mToKm">Meter → Kilometer</option>

<option value="kgToG">Kilogram → Gram</option>
<option value="gToKg">Gram → Kilogram</option>

<option value="cToF">Celsius → Fahrenheit</option>
<option value="fToC">Fahrenheit → Celsius</option>

<option value="cmToIn">Centimeter → Inch</option>
<option value="inToCm">Inch → Centimeter</option>

<option value="kmhToMs">km/h → m/s</option>
<option value="msToKmh">m/s → km/h</option>

<option value="usdToInr">USD → INR</option>
<option value="inrToUsd">INR → USD</option>

</select>

<h2 id="result">Result: </h2>

</div>

<footer>
Made with ❤️ by Deep
</footer>

<script src="script.js"></script>

</body>
</html>
